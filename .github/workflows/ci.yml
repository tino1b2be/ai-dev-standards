name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Both steps run even if the first fails so maintainers see every
      # failure in a single CI pass.

      - name: Run check-all (validate + sync-steering --check + scan)
        id: check_all
        if: always()
        run: python scripts/assemble-pack.py check-all

      - name: Run pytest
        id: pytest
        if: always()
        run: pytest tests/
